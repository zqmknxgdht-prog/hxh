name: Data Safety Lint

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Data safety lint
        run: bun scripts/check-data-safety.mjs

      - name: Build (also catches malformed JSON via tsc)
        run: bun run build
